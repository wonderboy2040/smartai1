services:
  # ── Single service: React frontend + Node API + ML Engine ──
  # CRITICAL: ML service merged into Node to stay within Render free tier
  # (750 hrs/month single service, no Python overhead).
  - type: web
    name: wealth-ai-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/ai-status
    envVars:
      - key: NODE_VERSION
        value: "22"

      # ── AI provider keys (set values in Render dashboard) ──────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

      # ── Telegram alerts ────────────────────────────────────────────────────
      - key: TG_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false

      # ── Google Apps Script portfolio sync ─────────────────────────────────
      - key: API_URL
        sync: false

      # ── US real-time prices (Finnhub WebSocket, tick-by-tick) ─────────────
      - key: FINNHUB_API_KEY
        sync: false

      # ── India real-time prices (AngelOne SmartAPI, NSE exchange feed) ──────
      - key: SMARTAPI_KEY
        sync: false
      - key: SMARTAPI_CLIENT_CODE
        sync: false
      - key: SMARTAPI_MPIN
        sync: false
      - key: SMARTAPI_TOTP_SECRET
        sync: false
      - key: SMARTAPI_PUBLIC_IP
        sync: false

      # ── ML service ─────────────────────────────────────────────────────────
      # VITE_ML_SERVICE_URL is NOT needed anymore — ML runs in-process.
      # The /api/ml/* routes serve all ML predictions from the Node server.
      # Remove this env var if you had it set.

