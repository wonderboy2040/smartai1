services:
  # ── Single service: React frontend + Node API + ML Engine + Bot ──
  # Render free tier: 750 hrs/month, 512MB RAM, auto-sleep after 15min idle.
  # For 24x7: use UptimeRobot (external, free) to ping /health every 5 min.
  # Do NOT self-ping — that violates Render ToS.
  - type: web
    name: wealth-ai-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"

      # ── AI provider keys (set values in Render dashboard) ──────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

      # ── Telegram alerts ────────────────────────────────────────────────────
      - key: TG_TOKEN
        sync: false
      - key: TG_CHAT_ID
        sync: false

      # ── Google Apps Script portfolio sync ─────────────────────────────────
      - key: API_URL
        sync: false

      # ── US real-time prices (Finnhub WebSocket, tick-by-tick) ─────────────
      - key: FINNHUB_API_KEY
        sync: false

      # ── Broker connectors (optional, read-only) ───────────────────────────
      - key: DHAN_CLIENT_ID
        sync: false
      - key: DHAN_ACCESS_TOKEN
        sync: false
