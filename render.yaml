# Render Blueprint — deploy the frontend + AI proxy as ONE Web Service.
# IMPORTANT: this must be a "Web Service" (runs Node), NOT a "Static Site".
# Set the API keys below in the Render dashboard (Environment) — they are
# kept server-side and never shipped to the browser.
services:
  - type: web
    name: wealth-ai-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/ai-status
    envVars:
      - key: NODE_VERSION
        value: "20"
      # ---- AI provider keys (set values in the Render dashboard) ----
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      # Optional: Google Apps Script portfolio-sync URL
      - key: API_URL
        sync: false
      # ML service URL — set this after the wealth-ai-ml service deploys below
      - key: VITE_ML_SERVICE_URL
        sync: false

  # ---- ML Service (Python FastAPI) ----------------------------------------
  # Hosts /predict, /signals, /train, /regime, /analyze, /health endpoints.
  # Deploy wealth-ai-ml FIRST, then paste its URL into VITE_ML_SERVICE_URL above.
  - type: web
    name: wealth-ai-ml
    runtime: python
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
